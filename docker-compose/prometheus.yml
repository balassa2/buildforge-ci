# Prometheus config for docker-compose local dev.
# Uses docker-compose service names instead of K8s DNS.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "buildforge-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:5000"]
        labels:
          service: "api"

  - job_name: "jenkins"
    metrics_path: "/prometheus/"
    static_configs:
      - targets: ["jenkins:8080"]
        labels:
          service: "jenkins"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
