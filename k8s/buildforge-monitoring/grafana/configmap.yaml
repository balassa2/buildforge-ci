# Grafana provisioning: auto-configures the Prometheus data source
# and loads dashboards from JSON files on startup.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: buildforge-monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.buildforge-monitoring:9090
        isDefault: true
        editable: false

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "BuildForge"
        orgId: 1
        folder: "BuildForge"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
