# Dashboard JSON files mounted into Grafana so they appear on startup.
# Grafana file provisioning expects bare dashboard JSON (no API wrapper).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: buildforge-monitoring
data:
  pipeline-health.json: |
    {"id":null,"uid":"buildforge-pipeline-health","title":"Pipeline Health","tags":["buildforge","ci-cd"],"timezone":"browser","schemaVersion":39,"version":1,"refresh":"30s","time":{"from":"now-24h","to":"now"},"panels":[{"id":1,"title":"Build Success Rate","type":"stat","gridPos":{"h":6,"w":8,"x":0,"y":0},"targets":[{"expr":"sum(rate(jenkins_builds_success_total[1h])) / sum(rate(jenkins_builds_total[1h])) * 100","legendFormat":"Success %"}],"fieldConfig":{"defaults":{"unit":"percent","thresholds":{"steps":[{"color":"red","value":null},{"color":"yellow","value":80},{"color":"green","value":95}]}}}},{"id":2,"title":"Build Failure Rate","type":"stat","gridPos":{"h":6,"w":8,"x":8,"y":0},"targets":[{"expr":"sum(rate(jenkins_builds_failed_total[1h])) / sum(rate(jenkins_builds_total[1h])) * 100","legendFormat":"Failure %"}],"fieldConfig":{"defaults":{"unit":"percent","thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":5},{"color":"red","value":10}]}}}},{"id":3,"title":"Total Builds (24h)","type":"stat","gridPos":{"h":6,"w":8,"x":16,"y":0},"targets":[{"expr":"sum(increase(jenkins_builds_total[24h]))","legendFormat":"Builds"}],"fieldConfig":{"defaults":{"unit":"short"}}},{"id":4,"title":"Build Duration Over Time","type":"timeseries","gridPos":{"h":10,"w":12,"x":0,"y":6},"targets":[{"expr":"jenkins_builds_duration_milliseconds_summary{quantile=\"0.5\"}","legendFormat":"p50"},{"expr":"jenkins_builds_duration_milliseconds_summary{quantile=\"0.95\"}","legendFormat":"p95"},{"expr":"jenkins_builds_duration_milliseconds_summary{quantile=\"0.99\"}","legendFormat":"p99"}],"fieldConfig":{"defaults":{"unit":"ms"}}},{"id":5,"title":"Builds by Status Over Time","type":"timeseries","gridPos":{"h":10,"w":12,"x":12,"y":6},"targets":[{"expr":"sum(rate(jenkins_builds_success_total[5m])) * 300","legendFormat":"Success"},{"expr":"sum(rate(jenkins_builds_failed_total[5m])) * 300","legendFormat":"Failed"},{"expr":"sum(rate(jenkins_builds_unstable_total[5m])) * 300","legendFormat":"Unstable"}]},{"id":6,"title":"Jenkins Queue Length","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":16},"targets":[{"expr":"jenkins_queue_size_value","legendFormat":"Queue Size"}]},{"id":7,"title":"Jenkins Executor Utilization","type":"gauge","gridPos":{"h":8,"w":12,"x":12,"y":16},"targets":[{"expr":"jenkins_executor_in_use_value / jenkins_executor_count_value * 100","legendFormat":"Utilization %"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":70},{"color":"red","value":90}]}}}}]}
  build-metrics.json: |
    {"id":null,"uid":"buildforge-build-metrics","title":"Build Metrics & Infrastructure","tags":["buildforge","infrastructure"],"timezone":"browser","schemaVersion":39,"version":1,"refresh":"30s","time":{"from":"now-6h","to":"now"},"panels":[{"id":1,"title":"API Request Rate","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":0},"targets":[{"expr":"sum(rate(flask_http_request_total[5m])) by (method, endpoint)","legendFormat":"{{method}} {{endpoint}}"}],"fieldConfig":{"defaults":{"unit":"reqps"}}},{"id":2,"title":"API Request Latency (p95)","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":0},"targets":[{"expr":"histogram_quantile(0.95, sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le, endpoint))","legendFormat":"{{endpoint}}"}],"fieldConfig":{"defaults":{"unit":"s"}}},{"id":3,"title":"API Error Rate (5xx)","type":"stat","gridPos":{"h":6,"w":8,"x":0,"y":8},"targets":[{"expr":"sum(rate(flask_http_request_total{status=~\"5..\"}[5m])) / sum(rate(flask_http_request_total[5m])) * 100","legendFormat":"Error %"}],"fieldConfig":{"defaults":{"unit":"percent","thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":1},{"color":"red","value":5}]}}}},{"id":4,"title":"Active Builds","type":"stat","gridPos":{"h":6,"w":8,"x":8,"y":8},"targets":[{"expr":"jenkins_builds_running_value","legendFormat":"Running"}],"fieldConfig":{"defaults":{"unit":"short"}}},{"id":5,"title":"Build Trigger Count (24h)","type":"stat","gridPos":{"h":6,"w":8,"x":16,"y":8},"targets":[{"expr":"sum(increase(flask_http_request_total{endpoint=\"/api/builds\", method=\"POST\"}[24h]))","legendFormat":"Triggers"}],"fieldConfig":{"defaults":{"unit":"short"}}},{"id":6,"title":"Pod CPU Usage","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":14},"targets":[{"expr":"sum(rate(container_cpu_usage_seconds_total{namespace=~\"buildforge.*\"}[5m])) by (pod)","legendFormat":"{{pod}}"}],"fieldConfig":{"defaults":{"unit":"short"}}},{"id":7,"title":"Pod Memory Usage","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":14},"targets":[{"expr":"sum(container_memory_working_set_bytes{namespace=~\"buildforge.*\"}) by (pod)","legendFormat":"{{pod}}"}],"fieldConfig":{"defaults":{"unit":"bytes"}}}]}
