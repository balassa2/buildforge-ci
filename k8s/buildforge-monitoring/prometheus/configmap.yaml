# Prometheus scrape configuration.
# Cross-namespace scraping uses fully qualified service DNS names:
#   <service>.<namespace>.svc.cluster.local
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: buildforge-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Flask API metrics (buildforge namespace)
      - job_name: "buildforge-api"
        metrics_path: "/metrics"
        static_configs:
          - targets: ["buildforge-api.buildforge.svc.cluster.local:5000"]
            labels:
              service: "api"
              namespace: "buildforge"

      # Jenkins metrics (buildforge-ci namespace)
      - job_name: "jenkins"
        metrics_path: "/prometheus/"
        static_configs:
          - targets: ["jenkins.buildforge-ci.svc.cluster.local:8080"]
            labels:
              service: "jenkins"
              namespace: "buildforge-ci"

      # Prometheus self-monitoring
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
