# Kind cluster configuration for BuildForge CI.
# Creates a single-node cluster with port mappings so nginx-ingress
# can serve traffic on localhost:80 and localhost:443.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP traffic -> ingress controller
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # HTTPS traffic -> ingress controller
      - containerPort: 443
        hostPort: 443
        protocol: TCP
